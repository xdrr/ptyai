name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Tool calls or commands that trigger the issue
      placeholder: |
        1. pty_create(...)
        2. pty_write(...)
        3. pty_wait(...)
        4. Error / unexpected output
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, ptyai version
      placeholder: |
        - OS: Ubuntu 24.04
        - Node: 22.3.0
        - ptyai: 0.1.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
